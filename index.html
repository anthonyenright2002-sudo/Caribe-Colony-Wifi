<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caribe Colony Guest Wi-Fi</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(#0099cc,#33cc99);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
}

.card{
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(6px);
    padding:40px;
    border-radius:20px;
    max-width:500px;
    width:90%;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

h1{
    margin-top:0;
    font-size:2em;
}

.progress{
    width:100%;
    height:24px;
    background:#ffffff44;
    border-radius:30px;
    overflow:hidden;
    margin:30px 0;
}

.bar{
    width:0%;
    height:100%;
    background:#00ff88;
    transition:width .2s linear;
}

#status{
    font-size:1.2em;
    min-height:35px;
}

#reveal{
    display:none;
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:#FFD54F;
}
button:hover{
    background:#FFE082;
}
</style>

</head>

<body>

<div class="card">

<div id="loading">

<h1>🌴 Caribe Colony Pool</h1>

<h2>FREE GUEST WI-FI</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="status">Searching for Network...</div>

</div>

<div id="reveal">

<h1>🎉 Congratulations!</h1>

<h2>You have successfully connected...</h2>

<h2>...</h2>

<h2>...</h2>

<h1>😂 to absolutely nothing.</h1>

<p>
Thanks for playing!
</p>

<p>
Enjoy your day at Caribe Colony Pool.
</p>

<button onclick="location.reload()">
Prank Someone Else 😄
</button>

</div>

</div>

<script>

const messages=[
"Searching for Network...",
"Signal Found ✔",
"Authenticating...",
"Obtaining IP Address...",
"Verifying HOA Membership...",
"Connecting..."
];

let percent=0;
let msg=0;

const bar=document.getElementById("bar");
const status=document.getElementById("status");

const interval=setInterval(()=>{

percent+=2;

bar.style.width=percent+"%";

if(percent%18===0 && msg<messages.length-1){
msg++;
status.innerHTML=messages[msg];
}

if(percent>=100){
clearInterval(interval);

setTimeout(()=>{

document.getElementById("loading").style.display="none";
document.getElementById("reveal").style.display="block";

},1200);

}

},80);

</script>

</body>
</html>
